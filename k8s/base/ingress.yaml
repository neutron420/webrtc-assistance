apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: interview-ingress
  namespace: ai-interview
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: interview-frontend
                port:
                  number: 3000
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: interview-backend
                port:
                  number: 8000
