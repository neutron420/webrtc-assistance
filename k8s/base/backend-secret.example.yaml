apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: ai-interview
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://user:password@postgres-host:5432/interview_db"
  REDIS_URL: "redis://interview-redis.ai-interview.svc.cluster.local:6379/0"
  OPENAI_API_KEY: "replace-me"
  GROQ_API_KEY: "replace-me"
  SECRET_KEY: "replace-with-long-random-secret"
  ALLOWED_ORIGINS: "https://app.example.com,http://localhost:3000"
