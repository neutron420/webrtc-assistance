version: '3.8'

services:
  backend:
    build:
      context: ./interview-backend
      dockerfile: Dockerfile
    container_name: interview-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./interview-backend/temp_audio:/app/temp_audio
      - ./interview-backend/interview_prep.db:/app/interview_prep.db
    depends_on:
      - redis
    restart: always

  frontend:
    build:
      context: ./interview-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: interview-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

  redis:
    image: redis:alpine
    container_name: interview-redis
    ports:
      - "6379:6379"
    restart: always
